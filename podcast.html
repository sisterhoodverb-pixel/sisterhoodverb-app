<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Podcast — Sisterhood(verb)</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ink: #1a1410;
      --cream: #f7f3ee;
      --warm: #e8ddd2;
      --terracotta: #c4714a;
      --terracotta-light: #e8956e;
      --muted: #8a7d72;
      --border: #ddd4c8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      padding: 2rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.4rem;
      padding: 0.25rem;
      line-height: 1;
    }

    .header-text h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .header-text p {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 0.15rem;
    }

    /* HERO PLAYER */
    .player-section {
      background: var(--ink);
      color: var(--cream);
      padding: 2rem 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .player-section::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196,113,74,0.3) 0%, transparent 70%);
      pointer-events: none;
    }

    .now-playing-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--terracotta-light);
      margin-bottom: 0.75rem;
    }

    .player-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 0.4rem;
    }

    .player-meta {
      font-size: 0.75rem;
      color: rgba(247,243,238,0.5);
      margin-bottom: 1.5rem;
    }

    /* Progress */
    .progress-wrap {
      margin-bottom: 1rem;
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      margin-bottom: 0.4rem;
    }

    .progress-fill {
      height: 100%;
      background: var(--terracotta);
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s linear;
      pointer-events: none;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      color: rgba(247,243,238,0.4);
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }

    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(247,243,238,0.6);
      font-size: 1.1rem;
      padding: 0.25rem;
      transition: color 0.2s;
    }

    .ctrl-btn:hover { color: var(--cream); }

    .play-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--terracotta);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.2rem;
      transition: background 0.2s, transform 0.15s;
    }

    .play-btn:hover {
      background: var(--terracotta-light);
      transform: scale(1.04);
    }

    /* Hidden audio */
    #audio-el { display: none; }

    /* LOCKED STATE */
    .locked-player {
      text-align: center;
      padding: 1.5rem 0 0.5rem;
    }

    .locked-icon {
      font-size: 2rem;
      margin-bottom: 0.75rem;
      opacity: 0.5;
    }

    .locked-player p {
      font-size: 0.85rem;
      color: rgba(247,243,238,0.6);
      line-height: 1.6;
      margin-bottom: 1.25rem;
    }

    .upgrade-btn {
      display: inline-block;
      background: var(--terracotta);
      color: white;
      border: none;
      padding: 0.7rem 1.8rem;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .upgrade-btn:hover { background: var(--terracotta-light); }

    /* EPISODE LIST */
    .episodes-section {
      padding: 1.5rem;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .episode-card {
      display: flex;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: opacity 0.2s;
      align-items: flex-start;
    }

    .episode-card:last-child { border-bottom: none; }
    .episode-card:hover { opacity: 0.75; }
    .episode-card.locked-ep { cursor: default; }
    .episode-card.locked-ep:hover { opacity: 1; }
    .episode-card.active .ep-num { color: var(--terracotta); }

    .ep-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--border);
      min-width: 2rem;
      line-height: 1;
      padding-top: 0.1rem;
    }

    .ep-info { flex: 1; }

    .ep-title {
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.35;
      margin-bottom: 0.3rem;
    }

    .ep-desc {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 0.4rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .ep-footer {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .ep-date {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .ep-duration {
      font-size: 0.68rem;
      color: var(--muted);
    }

    .lock-badge {
      font-size: 0.65rem;
      color: var(--terracotta);
      background: rgba(196,113,74,0.1);
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
      letter-spacing: 0.05em;
    }

    .ep-play-icon {
      font-size: 1.2rem;
      color: var(--muted);
      padding-top: 0.1rem;
      min-width: 1.5rem;
      text-align: center;
    }

    .active .ep-play-icon { color: var(--terracotta); }

    /* AUTH GATE */
    .auth-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      padding: 2rem;
      text-align: center;
    }

    .auth-gate h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 400;
      margin-bottom: 0.75rem;
    }

    .auth-gate p {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 1.5rem;
      max-width: 280px;
    }

    /* LOADING */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--terracotta);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* EMPTY */
    .empty {
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .empty p { margin-top: 0.5rem; line-height: 1.6; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--ink);
      color: var(--cream);
      padding: 0.7rem 1.5rem;
      border-radius: 100px;
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div id="app">
  <div class="loading"><div class="spinner"></div></div>
</div>

<audio id="audio-el"></audio>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://cqiymqekdtewnorojlus.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxaXltcWVrZHRld25vcm9qbHVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mjk2MTUsImV4cCI6MjA4OTAwNTYxNX0.mWB4UEvOXyWWGG9AhBN-0YZO57ojal4mbpi0aSEeRDQ';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PAID_TIERS = ['founding', 'monthly', 'annual'];

// Audio state
let currentEpisode = null;
let isPlaying = false;
const audioEl = document.getElementById('audio-el');

// --- Helpers ---
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function formatTime(sec) {
  if (isNaN(sec)) return '0:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// --- Auth check ---
async function getUser() {
  const { data: { user } } = await sb.auth.getUser();
  return user;
}

async function getUserTier(userId) {
  const { data, error } = await sb.from('profiles').select('membership_tier').eq('id', userId).single();
  if (error || !data) return 'free';
  return data.membership_tier || 'free';
}

// --- Episodes ---
async function getEpisodes() {
  const { data, error } = await sb
    .from('podcast_episodes')
    .select('*')
    .order('published_at', { ascending: true });
  if (error) return [];
  return data || [];
}

// --- Signed URL for audio ---
async function getAudioUrl(path) {
  // If it's already a full URL, return as-is
  if (path.startsWith('http')) return path;
  // Otherwise get a signed URL from Supabase storage
  const { data, error } = await sb.storage.from('podcast-audio').createSignedUrl(path, 3600);
  if (error) return null;
  return data.signedUrl;
}

// --- Player ---
function updateProgressUI() {
  const fill = document.getElementById('progress-fill');
  const cur = document.getElementById('time-current');
  const dur = document.getElementById('time-duration');
  if (!fill || !cur || !dur) return;
  const pct = audioEl.duration ? (audioEl.currentTime / audioEl.duration) * 100 : 0;
  fill.style.width = pct + '%';
  cur.textContent = formatTime(audioEl.currentTime);
  dur.textContent = formatTime(audioEl.duration);
}

function updatePlayBtn() {
  const btn = document.getElementById('play-btn');
  if (!btn) return;
  btn.innerHTML = isPlaying ? '⏸' : '▶';
}

audioEl.addEventListener('timeupdate', updateProgressUI);
audioEl.addEventListener('ended', () => { isPlaying = false; updatePlayBtn(); });
audioEl.addEventListener('loadedmetadata', updateProgressUI);

async function playEpisode(ep, tier) {
  currentEpisode = ep;

  // Update active state
  document.querySelectorAll('.episode-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('ep-card-' + ep.id);
  if (card) card.classList.add('active');

  // Update player header
  const titleEl = document.getElementById('player-title');
  const metaEl = document.getElementById('player-meta');
  if (titleEl) titleEl.textContent = ep.title;
  if (metaEl) metaEl.textContent = formatDate(ep.published_at);

  // Get audio URL
  const url = await getAudioUrl(ep.audio_url);
  if (!url) { showToast('Could not load audio.'); return; }

  audioEl.src = url;
  audioEl.play();
  isPlaying = true;
  updatePlayBtn();
}

function togglePlay() {
  if (!audioEl.src) return;
  if (isPlaying) { audioEl.pause(); isPlaying = false; }
  else { audioEl.play(); isPlaying = true; }
  updatePlayBtn();
}

function seekBar(e) {
  const bar = document.getElementById('progress-bar');
  if (!bar || !audioEl.duration) return;
  const rect = bar.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audioEl.currentTime = pct * audioEl.duration;
}

function skip(secs) {
  audioEl.currentTime = Math.max(0, Math.min(audioEl.duration || 0, audioEl.currentTime + secs));
}

// --- Render ---
function renderAuthGate() {
  document.getElementById('app').innerHTML = `
    <div class="header">
      <button class="back-btn" onclick="history.back()">←</button>
      <div class="header-text">
        <h1>The Podcast</h1>
        <p>Sisterhood(verb)</p>
      </div>
    </div>
    <div class="auth-gate">
      <div style="font-size:2.5rem;margin-bottom:1rem;">🎙</div>
      <h2>Listen In</h2>
      <p>Sign in to your Sisterhood(verb) account to access the podcast.</p>
      <button class="upgrade-btn" onclick="window.location.href='/'">Sign In</button>
    </div>
  `;
}

function renderPage(episodes, tier) {
  const isPaid = PAID_TIERS.includes(tier);
  // Oldest episode = first in array (sorted ascending)
  const freeEpisodeId = episodes.length > 0 ? episodes[0].id : null;

  const playerEp = isPaid
    ? (episodes[0] || null)
    : (episodes.find(e => e.id === freeEpisodeId) || null);

  const playerHTML = playerEp ? `
    <div class="player-section">
      <div class="now-playing-label">Now Playing</div>
      <div class="player-title" id="player-title">${playerEp.title}</div>
      <div class="player-meta" id="player-meta">${formatDate(playerEp.published_at)}</div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar" onclick="seekBar(event)">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="time-row">
          <span id="time-current">0:00</span>
          <span id="time-duration">0:00</span>
        </div>
      </div>
      <div class="controls">
        <button class="ctrl-btn" onclick="skip(-15)" title="Back 15s">⟪ 15</button>
        <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="skip(30)" title="Forward 30s">30 ⟫</button>
      </div>
    </div>
  ` : `
    <div class="player-section">
      <div class="locked-player">
        <div class="locked-icon">🔒</div>
        <p>Subscribe to start listening to the Sisterhood(verb) podcast.</p>
        <button class="upgrade-btn">Subscribe to Listen</button>
      </div>
    </div>
  `;

  const episodesHTML = episodes.length === 0
    ? `<div class="empty"><div style="font-size:2rem">🎙</div><p>Episodes coming soon.<br/>Check back shortly.</p></div>`
    : episodes.map((ep, i) => {
        const canPlay = isPaid || ep.id === freeEpisodeId;
        return `
          <div class="episode-card ${canPlay ? '' : 'locked-ep'}" id="ep-card-${ep.id}"
               ${canPlay ? `onclick="playEpisode(window._episodes[${i}], '${tier}')"` : ''}>
            <div class="ep-num">${String(i + 1).padStart(2, '0')}</div>
            <div class="ep-info">
              <div class="ep-title">${ep.title}</div>
              ${ep.description ? `<div class="ep-desc">${ep.description}</div>` : ''}
              <div class="ep-footer">
                <span class="ep-date">${formatDate(ep.published_at)}</span>
                ${ep.duration ? `<span class="ep-duration">${ep.duration}</span>` : ''}
                ${!canPlay ? `<span class="lock-badge">Members only</span>` : ''}
              </div>
            </div>
            <div class="ep-play-icon">${canPlay ? (i === 0 && !isPaid ? '▶' : '▶') : '🔒'}</div>
          </div>
        `;
      }).join('');

  document.getElementById('app').innerHTML = `
    <div class="header">
      <button class="back-btn" onclick="history.back()">←</button>
      <div class="header-text">
        <h1>The Podcast</h1>
        <p>Sisterhood(verb) · ${episodes.length} episode${episodes.length !== 1 ? 's' : ''}</p>
      </div>
    </div>
    ${playerHTML}
    <div class="episodes-section">
      <div class="section-label">All Episodes</div>
      ${episodesHTML}
    </div>
  `;

  // Store episodes globally for onclick access
  window._episodes = episodes;

  // Auto-load first playable episode into player (don't autoplay)
  if (playerEp) {
    setTimeout(async () => {
      const url = await getAudioUrl(playerEp.audio_url);
      if (url) {
        audioEl.src = url;
        audioEl.load();
      }
    }, 300);
  }
}

// --- Init ---
async function init() {
  const user = await getUser();
  if (!user) { renderAuthGate(); return; }

  const tier = await getUserTier(user.id);
  const episodes = await getEpisodes();
  renderPage(episodes, tier);
}

init();
</script>
</body>
</html>
